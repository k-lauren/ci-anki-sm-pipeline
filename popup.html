<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 260px; margin: 0; padding: 12px; color: #111; }
  h2 { font-size: 14px; margin: 0 0 8px 0; }
  .row { font-size: 12px; color: #555; margin: 4px 0; }
  .ok { color: #107c10; }
  .err { color: #b00020; }
  button { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #1a73e8; background: #1a73e8; color: #fff; font-size: 13px; cursor: pointer; margin-top: 8px; }
  button.secondary { background: #fff; color: #1a73e8; }
  .hint { font-size: 11px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
  <h2>YT Immersion Mining</h2>
  <div class="row" id="ankiStatus">Checking AnkiConnect…</div>
  <div class="row" id="apiStatus"></div>
  <button id="open">Settings</button>
  <button id="recheck" class="secondary" type="button">Re-check Anki</button>
  <div class="hint">On a YouTube video with manual captions, <b>hold Q</b> for the length of the clip you want, then release to save.</div>
  <script src="popup.js"></script>
</body>
</html>
